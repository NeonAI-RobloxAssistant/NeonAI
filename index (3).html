<!DOCTYPE html>
<html>
<head>
  <title>NeonAI</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="margin:0;padding:0">
  <div id="root"></div>
  <script>
    const {useState} = React;
    function App() {
      const [prompt, setPrompt] = useState('');
      const [code, setCode] = useState('');
      const [count, setCount] = useState(0);
      const generate = async () => {
        if(count >= 4) return alert('Upgrade to Premium');
        try {
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514',
              max_tokens: 1000,
              system: 'Generate Roblox Lua code only',
              messages: [{role: 'user', content: prompt}]
            })
          });
          const data = await res.json();
          setCode(data.content[0].text);
          setCount(count + 1);
        } catch(e) {alert(e)}
      };
      return React.createElement('div', {className: 'min-h-screen bg-slate-900 text-white p-8'},
        React.createElement('h1', {className: 'text-4xl mb-4 text-cyan-400'}, '🌟 NeonAI'),
        React.createElement('div', {className: 'grid md:grid-cols-2 gap-8'},
          React.createElement('div', {},
            React.createElement('textarea', {
              value: prompt,
              onChange: e => setPrompt(e.target.value),
              placeholder: 'Describe code...',
              className: 'w-full h-40 p-4 bg-slate-800 text-white rounded border border-cyan-500',
              style: {fontFamily: 'monospace'}
            }),
            React.createElement('button', {
              onClick: generate,
              className: 'mt-4 w-full py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded font-bold'
            }, '▶ Generate')
          ),
          React.createElement('pre', {
            className: 'bg-slate-800 p-4 rounded text-cyan-300 overflow-auto max-h-80 border border-cyan-500/20',
            style: {fontFamily: 'monospace', whiteSpace: 'pre-wrap'}
          }, code || '✨ Code will appear here')
        ),
        React.createElement('p', {className: 'mt-8 text-slate-400'}, `Used: ${count}/4 | Upgrade for unlimited`)
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
