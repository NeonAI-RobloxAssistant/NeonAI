<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeonAI - Roblox Studio AI Assistant</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="margin: 0; padding: 0;">
  <div id="root"></div>
  
  <script>
    const e = React.createElement;
    const { useState, useRef } = React;

    function NeonAI() {
      const [prompt, setPrompt] = useState('');
      const [generatedCode, setGeneratedCode] = useState(null);
      const [loading, setLoading] = useState(false);
      const [copied, setCopied] = useState(false);
      const [activeTab, setActiveTab] = useState('generator');
      const [usageCount, setUsageCount] = useState(0);
      const [isPremium, setIsPremium] = useState(false);
      const [showPaywall, setShowPaywall] = useState(false);

      const canGenerate = () => isPremium || usageCount < 3;

      const generateCode = async () => {
        if (!canGenerate()) {
          setShowPaywall(true);
          return;
        }
        if (!prompt.trim()) return;
        setLoading(true);
        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: "You are an expert Roblox Lua programmer. Generate clean Lua code. Output ONLY code.",
              messages: [{ role: "user", content: prompt }],
            })
          });
          const data = await response.json();
          setGeneratedCode(data.content[0].text);
          const newCount = usageCount + 1;
          setUsageCount(newCount);
          if (newCount >= 3 && !isPremium) {
            setTimeout(() => setShowPaywall(true), 1500);
          }
        } catch (error) {
          alert('Error: ' + error.message);
        } finally {
          setLoading(false);
        }
      };

      const copyCode = () => {
        navigator.clipboard.writeText(generatedCode);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return e('div', { className: 'min-h-screen bg-slate-900 text-white' },
        e('div', { className: 'max-w-6xl mx-auto px-6 py-8' },
          e('div', { className: 'mb-8' },
            e('h1', { className: 'text-4xl font-bold text-cyan-400 mb-2' }, '🌟 NeonAI'),
            e('p', { className: 'text-slate-400' }, 'Roblox Studio AI Assistant')
          ),

          e('div', { className: 'grid md:grid-cols-2 gap-8' },
            e('div', {},
              e('textarea', {
                value: prompt,
                onChange: (ev) => setPrompt(ev.target.value),
                disabled: !canGenerate(),
                placeholder: 'Describe what code you need...',
                className: 'w-full h-40 p-4 bg-slate-800 text-white rounded-lg border border-cyan-500/30 focus:outline-none focus:border-cyan-500',
                style: { fontFamily: 'monospace' }
              }),
              e('button', {
                onClick: generateCode,
                disabled: loading || !prompt.trim() || !canGenerate(),
                className: 'mt-4 w-full py-3 bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-700 text-white font-bold rounded-lg transition',
              }, loading ? '⏳ Generating...' : !canGenerate() ? '🔒 Trial Ended' : '▶ Generate Code')
            ),

            e('div', {},
              generatedCode ? e('div', {},
                e('div', { className: 'flex justify-between items-center mb-2' },
                  e('h3', { className: 'text-orange-400 font-bold' }, 'Generated Code'),
                  e('button', {
                    onClick: copyCode,
                    className: 'px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm'
                  }, copied ? '✓ Copied!' : '📋 Copy')
                ),
                e('pre', {
                  className: 'bg-slate-800 p-4 rounded-lg overflow-auto max-h-80 text-cyan-300 text-sm border border-cyan-500/20',
                  style: { fontFamily: 'monospace', whiteSpace: 'pre-wrap', wordBreak: 'break-word' }
                }, generatedCode)
              ) : e('div', { className: 'h-80 bg-slate-800 rounded-lg flex items-center justify-center text-slate-500' }, '✨ Code will appear here')
            )
          ),

          e('div', { className: 'mt-8 text-center text-slate-500' },
            e('p', {}, `Free: ${usageCount}/3 | ${isPremium ? '✓ Premium' : 'Upgrade to unlock unlimited'}`)
          )
        ),

        showPaywall && e('div', { className: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50' },
          e('div', { className: 'bg-slate-900 p-8 rounded-lg max-w-md border border-orange-500/30' },
            e('h2', { className: 'text-2xl font-bold text-orange-400 mb-4' }, '🔒 Trial Ended'),
            e('p', { className: 'text-slate-400 mb-6' }, 'You\'ve used 3 free generations!'),
            e('button', {
              onClick: () => window.location.href = 'https://buy.stripe.com/test_14k4gq6Jt5Za5gI144',
              className: 'w-full py-3 bg-orange-600 hover:bg-orange-500 text-white font-bold rounded-lg'
            }, '💳 Unlock Premium')
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(NeonAI));
  </script>
</body>
</html>
